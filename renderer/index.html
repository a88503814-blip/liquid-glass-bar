<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <title>Liquid Glass Bar</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<svg xmlns="http://www.w3.org/2000/svg" style="display:none" aria-hidden="true">

  <symbol id="ic-vol-full" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19" fill="currentColor" stroke="none" opacity="0.85"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14"/></symbol>
  <symbol id="ic-vol-mid" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19" fill="currentColor" stroke="none" opacity="0.85"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></symbol>

  <symbol id="ic-bell" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></symbol>
  <symbol id="ic-uptime" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="22,12 18,12 15,21 9,3 6,12 2,12"/></symbol>
  <symbol id="ic-layers" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><polygon points="12,2 2,7 12,12 22,7"/><polyline points="2,17 12,22 22,17"/><polyline points="2,12 12,17 22,12"/></symbol>
  <symbol id="ic-ping" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M1 6l4 6 4-3 4 10 4-14 4 5"/></symbol>
  <symbol id="ic-settings" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></symbol>
  <symbol id="ic-x" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></symbol>
  <symbol id="ic-app-discord" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.8 19.8 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.74 19.74 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057.1 18.08.114 18.1.133 18.112a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.1 13.1 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.3 12.3 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.84 19.84 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></symbol>
  <symbol id="ic-app-spotify" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/></symbol>
  <symbol id="ic-app-default" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></symbol>
</svg>

<!-- DYNAMIC ISLAND — sits within the 44px window, top:4px height:36px = 40px total -->
<div id="notification-island" role="alert" aria-live="polite">
  <div class="ni-icon-wrap">
    <svg class="ni-svg-icon"><use id="ni-icon" href="#ic-bell"/></svg>
  </div>
  <div class="ni-content">
    <div class="ni-header">
      <span class="ni-app" id="ni-app">System</span>
      <span class="ni-time" id="ni-time">now</span>
    </div>
    <div class="ni-title" id="ni-title">Notification</div>
    <div class="ni-text"  id="ni-text"></div>
  </div>
  <div class="ni-progress" id="ni-progress"></div>
</div>

<!-- BAR -->
<div id="bar">

  <div class="bar-side bar-left">
    <div class="widget widget-ws" id="ws-widget">
      <svg class="icon icon-xs icon-dim"><use href="#ic-layers"/></svg>
      <div id="ws-list" class="ws-list">
        <button class="ws active" data-index="1">1</button>
        <button class="ws"        data-index="2">2</button>
        <button class="ws"        data-index="3">3</button>
        <button class="ws"        data-index="4">4</button>
      </div>
    </div>
    <div class="widget widget-media" id="media-widget">
      <svg class="icon media-play" id="media-play-icon"><use id="media-play-use" href="#ic-music"/></svg>
      <div class="media-text">
        <span class="media-title"  id="media-title">Nothing Playing</span>
        <span class="media-artist" id="media-artist"></span>
      </div>
    </div>
  </div>

  <div class="bar-center">
    <div class="widget widget-clock">
      <svg class="icon icon-xs icon-dim"><use href="#ic-clock"/></svg>
      <span id="clock-time" class="clock-time">00:00:00</span>
      <div class="c-divider"></div>
      <svg class="icon icon-xs icon-dim"><use href="#ic-calendar"/></svg>
      <span id="clock-date" class="clock-date">Mon, Jan 1</span>
    </div>
  </div>

  <div class="bar-side bar-right">
    <div class="widget widget-weather" id="weather-widget">
      <svg class="icon weather-icon" id="weather-svg"><use id="weather-use" href="#ic-partly-cloudy"/></svg>
      <div class="weather-vals">
        <span id="weather-temp">--°C</span>
        <span class="weather-desc" id="weather-desc">Loading</span>
      </div>
    </div>
    <div class="widget widget-pomo" id="pomo-widget" title="Left: start/pause · Right: reset">
      <svg class="icon pomo-icon" id="pomo-svg"><use id="pomo-use" href="#ic-timer"/></svg>
      <span id="pomo-time" class="pomo-time">25:00</span>
      <span class="pomo-dot" id="pomo-dot"></span>
    </div>
    <div class="widget widget-net" id="net-widget">
      <svg class="icon net-icon" id="net-svg"><use id="net-use" href="#ic-wifi-full"/></svg>
      <div class="net-info">
        <span class="net-ssid" id="net-ssid">Network</span>
        <div class="net-row">
          <svg class="icon icon-xs icon-dim"><use href="#ic-ping"/></svg>
          <span id="net-ping" class="ping-val">--ms</span>
        </div>
      </div>
    </div>
    <!-- System stats: click opens volume panel popup -->
    <div class="widget widget-sys" id="sys-widget" title="Click for volume">
      <div class="stat-blk">
        <svg class="icon icon-xs icon-dim"><use href="#ic-cpu"/></svg>
        <div class="stat-col"><span class="slabel">CPU</span><span class="sval" id="cpu-val">--%</span></div>
      </div>
      <div class="sdiv"></div>
      <div class="stat-blk">
        <svg class="icon icon-xs icon-dim"><use href="#ic-ram"/></svg>
        <div class="stat-col"><span class="slabel">RAM</span><span class="sval" id="ram-val">--%</span></div>
      </div>
      <div class="sdiv"></div>
      <div class="stat-blk">
        <svg class="icon icon-xs" id="vol-bar-svg"><use id="vol-bar-use" href="#ic-vol-full"/></svg>
        <div class="stat-col"><span class="slabel">VOL</span><span class="sval" id="vol-bar-val">--%</span></div>
      </div>
    </div>
    <div class="widget widget-uptime">
      <svg class="icon icon-xs icon-dim"><use href="#ic-uptime"/></svg>
      <div class="stat-col"><span class="slabel">UP</span><span class="sval" id="uptime-val">--</span></div>
    </div>
    <div class="widget widget-bat" id="bat-widget">
      <svg class="icon bat-icon" id="bat-svg"><use id="bat-use" href="#ic-bat-100"/></svg>
      <span id="bat-pct" class="sval">--%</span>
    </div>
    <button class="icon-btn" id="settings-btn" title="Settings">
      <svg class="icon icon-xs"><use href="#ic-settings"/></svg>
    </button>

    <!-- Update pill — hidden until update detected -->
    <div id="update-pill" class="update-pill hidden" title="Update available">
      <span id="update-pill-text">Update</span>
    </div>

  </div>

</div>

<script src="renderer.js"></script>
</body>
</html>
