<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'">
  <title>Notification</title>
  <style>
    :root {
      --accent: #60c8ff;
      --t1: rgba(255,255,255,.93);
      --t2: rgba(255,255,255,.58);
      --t3: rgba(255,255,255,.30);
      --border: rgba(255,255,255,.11);
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body {
      width:340px; height:90px;
      background:transparent; overflow:hidden;
      font-family:'Segoe UI Variable Display','Segoe UI',system-ui,sans-serif;
      -webkit-font-smoothing:antialiased;
      user-select:none;
    }

    #card {
      width:340px; height:90px;
      background:rgba(22,22,30,.97);
      border:1px solid var(--border);
      border-radius:14px;
      padding:12px 14px 0 12px;
      display:flex; align-items:flex-start; gap:11px;
      box-shadow:0 12px 40px rgba(0,0,0,.70), inset 0 1px 0 rgba(255,255,255,.07);
      cursor:pointer;
      position:relative; overflow:hidden;
    }
    #card:hover { background:rgba(30,30,40,.97); }

    /* App icon area */
    .app-icon {
      width:36px; height:36px; border-radius:9px; flex-shrink:0;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.10);
      display:flex; align-items:center; justify-content:center;
      overflow:hidden;
    }
    .app-icon svg { width:20px; height:20px; color:var(--accent); }
    .app-icon img { width:100%; height:100%; object-fit:cover; border-radius:8px; }

    /* Content */
    .content { flex:1; min-width:0; display:flex; flex-direction:column; gap:3px; }

    .header { display:flex; align-items:center; justify-content:space-between; gap:6px; }
    .app-name { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--t3); }
    .notif-time { font-size:9.5px; color:var(--t3); flex-shrink:0; }

    .notif-title { font-size:13px; font-weight:700; color:var(--t1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.3; }
    .notif-body  { font-size:11px; color:var(--t2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; line-height:1.4; }

    /* Progress drain */
    #progress {
      position:absolute; bottom:0; left:0;
      height:2px; width:100%;
      background:linear-gradient(90deg, var(--accent), rgba(96,200,255,.08));
      transform-origin:left center;
      transform:scaleX(1);
    }

    /* Dismiss X button */
    .dismiss {
      position:absolute; top:8px; right:8px;
      width:20px; height:20px; border-radius:50%;
      background:rgba(255,255,255,.08); border:none;
      color:var(--t3); cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      font-size:13px; line-height:1;
    }
    .dismiss:hover { background:rgba(255,255,255,.16); color:var(--t2); }
  </style>
</head>
<body>
<div id="card">
  <div class="app-icon" id="icon-wrap">
    <!-- default bell icon -->
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
      <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
    </svg>
  </div>
  <div class="content">
    <div class="header">
      <span class="app-name" id="app-name">System</span>
      <span class="notif-time" id="notif-time">now</span>
    </div>
    <div class="notif-title" id="notif-title">Notification</div>
    <div class="notif-body"  id="notif-body"></div>
  </div>
  <button class="dismiss" id="dismiss-btn" title="Dismiss">×</button>
  <div id="progress"></div>
</div>

<script>
'use strict';

const DISMISS_MS = 6000;

// Receive notification data from main process
window.electronAPI.onNotification(({ appName, title, body, iconB64 }) => {
  document.getElementById('app-name').textContent    = (appName || 'System').toUpperCase();
  document.getElementById('notif-title').textContent = title || '';
  document.getElementById('notif-body').textContent  = body  || '';

  // Time
  const now = new Date();
  document.getElementById('notif-time').textContent =
    `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  // App icon (if base64 provided)
  const wrap = document.getElementById('icon-wrap');
  if (iconB64) {
    wrap.innerHTML = '<img src="data:image/png;base64,' + iconB64 + '" alt="">';
  } else {
    // Keep default bell
    wrap.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>';
  }

  // Progress bar drain
  const prog = document.getElementById('progress');
  prog.style.transition = 'none';
  prog.style.transform  = 'scaleX(1)';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    prog.style.transition = 'transform ' + DISMISS_MS + 'ms linear';
    prog.style.transform  = 'scaleX(0)';
  }));

  // Auto-dismiss
  clearTimeout(window._dismissTimer);
  window._dismissTimer = setTimeout(() => window.electronAPI.hideNotifPanel(), DISMISS_MS);
});

// Click anywhere on card or X to dismiss
document.getElementById('card').addEventListener('click', () => window.electronAPI.hideNotifPanel());
document.getElementById('dismiss-btn').addEventListener('click', e => {
  e.stopPropagation();
  window.electronAPI.hideNotifPanel();
});
</script>
</body>
</html>
